add_load:
  name: Add load
  description: Append an entity (switch, climate, group, etc.) to the shed-priority list.
  fields:
    item:
      name: Entity
      description: Entity ID to add (least critical added last).
      required: true
      selector:
        entity:

remove_load:
  name: Remove load
  description: Remove an entity from the priority list. If it is currently shed, it is restored first.
  fields:
    item:
      name: Entity
      description: Entity ID to remove.
      required: true
      selector:
        entity:

move_load:
  name: Move load
  description: Move an entity up (shed sooner) or down (shed later) in priority.
  fields:
    item:
      name: Entity
      description: Entity ID to move.
      required: true
      selector:
        entity:
    direction:
      name: Direction
      description: up = shed sooner, down = shed later.
      required: true
      selector:
        select:
          options:
            - up
            - down

set_toggle_interval:
  name: Set toggle interval
  description: >-
    Set the per-device minimum time between toggling a load (anti short-cycle).
    Overrides the global default for this one entity. 0 disables the guard for it.
  fields:
    item:
      name: Entity
      description: Entity ID already in the priority list.
      required: true
      selector:
        entity:
    seconds:
      name: Minimum toggle interval
      description: Minimum seconds between toggling this device (0 to disable).
      required: true
      selector:
        number:
          min: 0
          max: 3600
          step: 30
          unit_of_measurement: s
          mode: box
